name: BPB Worker Obfuscate

on:
  workflow_dispatch:  # 允许手动点一下就跑
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 下载官方最新的未混淆面板（正确地址）
      - name: Download BPB unobfuscated worker
        run: |
          wget -O origin.js https://github.com/bia-pain-bache/BPB-Worker-Panel/releases/latest/download/worker.js

      - name: Install obfuscator
        run: npm install -g javascript-obfuscator

      - name: Obfuscate
        run: javascript-obfuscator origin.js --output _worker.js

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add origin.js _worker.js
          git commit -m "Auto build BPB worker"
          git push
